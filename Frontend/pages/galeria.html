    <link rel="stylesheet" href="/style.css" />

  <body>
    <header>
      <nav class="nav-menu">
        <ul>
          <li class="nav-link"><a href="/index.html">Inicio</a></li>
          <li class="nav-link"><a href="servicios.html"> Servicios</a></li>

          <li class="nav-link">

      <h1>Guagua Time RD</h1>
      <p>Simulador de rutas y costos del transporte publico</p>
    </header>

    <main>
      <section id="galeria-transporte">
        <h2>Nuestra Red de Transporte</h2>
        <p>Conoce las unidades que conectan a la República Dominicana.</p>

        <div class="galeria-container">
          <!-- Tarjeta OMSA -->
          <figure class="galeria-item">
            <img src="Frontend/img/omsa.jpg" alt="Autobús de la OMSA" />
            <figcaption>
              <h3>OMSA</h3>
              <p>
                Servicio de autobuses estatales en Santo Domingo y Santiago.
              </p>
            </figcaption>
          </figure>

          <!-- Tarjeta Carro Público -->
          <figure class="galeria-item">
            <img src="Frontend/img/concho.jpg" alt="Carro público o concho" />
            <figcaption>
              <h3>Carro Público (Concho)</h3>
              <p>El transporte tradicional de rutas específicas.</p>
            </figcaption>
          </figure>

          <!-- Tarjeta Teleférico -->
          <figure class="galeria-item">
            <img
              src="Frontend/img/teleferico.jpg"
              alt="Teleférico de Santo Domingo"
            />
            <figcaption>
              <h3>Teleférico</h3>
              <p>Conexión aérea para las zonas de difícil acceso.</p>
            </figcaption>
          </figure>

          <!-- Tarjeta Metro -->
          <figure class="galeria-item">
            <img src="Frontend/img/metro.jpg" alt="Metro de Santo Domingo" />
            <figcaption>
              <h3>Metro de Santo Domingo</h3>
              <p>El sistema ferroviario más moderno del Caribe.</p>
            </figcaption>
          </figure>
        </div>
      </section>
    </main>

    <footer>
      <h3>Guagua Time RD</h3>
      <p>@GuaguaTimeRD. Todos los derechos reservados</p>
    </footer>
  </body>
